name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Debug info
      run: |
        java -version
        echo "JAVA_HOME=$JAVA_HOME"
        which java
        java -Xmx512m -version
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v2
    
    - name: Build Debug APK
      run: |
        chmod +x gradlew
        ./gradlew --version
        ./gradlew assembleDebug --no-daemon --info 2>&1 | tee build.log || cat build.log
    
    - name: Run Unit Tests
      run: |
        ./gradlew testDebugUnitTest --no-daemon --info 2>&1 | tee test.log || cat test.log
    
    - name: Upload APK Artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
    
    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: app/build/test-results/
    
    - name: Debug build log
      if: failure()
      run: |
        echo "=== Build Log (last 200 lines) ==="
        tail -200 build.log 2>/dev/null || echo "No build log found"
