name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission to Gradle
        run: chmod +x ./gradlew

      - name: List Gradle tasks (for debugging)
        run: |
          ./gradlew tasks --all > tasks.log || true
          ls -la

      - name: Build All APKs (Debug + Release)
      run: |
        ./gradlew :app:assemble --stacktrace 2>&1 | tee build.log
        echo "=== Build completed with exit code $? ==="

      - name: Debug - Check build directory structure
        run: |
          echo "=== Checking directory structure ==="
          ls -la
          echo ""
          ls -la app/ 2>/dev/null || echo "app directory does not exist"
          echo ""
          ls -la app/build/ 2>/dev/null || echo "app/build does not exist"
          echo ""
          ls -la app/build/outputs/ 2>/dev/null || echo "app/build/outputs does not exist"
          echo ""
          ls -la app/build/outputs/apk/ 2>/dev/null || echo "app/build/outputs/apk does not exist"
          echo ""
          ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "app/build/outputs/apk/debug does not exist"
          echo ""
          echo "=== Finding all APK files ==="
          find . -name "*.apk" -type f 2>/dev/null || echo "No APK files found"
          echo ""
          echo "=== Finding all output files ==="
          find . -type f -name "*.apk" -o -name "*.aab" -o -name "*.jar" 2>/dev/null || true

      - name: Upload all artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            **/*.apk
            **/*.aab
            **/*.jar
            *.log
            app/build/outputs/
